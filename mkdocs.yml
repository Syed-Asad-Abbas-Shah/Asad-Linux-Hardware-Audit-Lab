site_name: Asad Linux Hardware Audit Lab
site_description: Professional Linux hardware inspection, live command captures, and systems-engineering analysis.
site_author: Syed Asad Abbas Shah

repo_name: Syed-Asad-Abbas-Shah/Asad-Linux-Hardware-Audit-Lab
repo_url: https://github.com/Syed-Asad-Abbas-Shah/Asad-Linux-Hardware-Audit-Lab

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: docs
site_dir: site

nav:
  - Home: index.md
  - Audit Modules:
    - 01 · System Summary: 01-system-summary.md
    - 02 · CPU: 02-cpu.md
    - 03 · GPU & Display: 03-gpu-display.md
    - 04 · Memory: 04-memory.md
    - 05 · Storage: 05-storage.md
    - 06 · Motherboard & Firmware: 06-motherboard-firmware.md
    - 07 · Network & Bluetooth: 07-network-bluetooth.md
    - 08 · Audio: 08-audio.md
    - 09 · USB: 09-usb.md
    - 10 · Sensors: 10-sensors.md
    - 11 · Power & Battery: 11-power-battery.md
    - 12 · PCI Bus: 12-pci.md
    - 13 · Kernel & Firmware: 13-kernel-firmware.md
    - 14 · GUI Tools: 14-gui-tools.md
